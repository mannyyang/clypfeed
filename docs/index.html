<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClypFeed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    header { margin-bottom: 2rem; border-bottom: 1px solid #e5e5e5; padding-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .tagline { color: #888; font-size: 0.85rem; margin-top: 0.15rem; }

    nav { margin-top: 0.75rem; }
    .nav-link {
      font-size: 0.8rem;
      color: #111;
      text-decoration: none;
      border: 1px solid #ddd;
      padding: 0.25rem 0.75rem;
      border-radius: 3px;
    }
    .nav-link:hover { background: #f5f5f5; }

    .digest { margin-bottom: 2.5rem; }
    .digest h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .signal {
      background: #f8f8f8;
      border-left: 3px solid #111;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
      line-height: 1.5;
      color: #333;
    }

    .item {
      margin-bottom: 1.25rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid #eee;
      overflow: hidden;
    }
    .item:last-child { border-bottom: none; }

    .item-image {
      float: right;
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
      margin-left: 1rem;
      margin-bottom: 0.5rem;
      background: #f0f0f0;
    }

    .item-content { overflow: hidden; }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .category-tag {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: #f0f0f0;
      color: #555;
      padding: 2px 6px;
      border-radius: 2px;
    }

    .source {
      font-size: 0.7rem;
      color: #999;
    }

    .item h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.3rem; line-height: 1.3; }
    .item h3 a { color: #111; text-decoration: none; }
    .item h3 a:hover { text-decoration: underline; }

    .item p { color: #555; font-size: 0.85rem; line-height: 1.6; }

    .empty { color: #999; font-style: italic; }

    @media (max-width: 480px) {
      .item-image { width: 80px; height: 56px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>ClypFeed</h1>
    <p class="tagline">AI news digests</p>
    <nav><a href="archive.html" class="nav-link">Past 7 days →</a></nav>
  </header>
  
</body>
</html>
